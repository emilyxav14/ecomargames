'

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LetroMar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --ocean-1:#0b3440;
  --ocean-2:#0f5f73;
  --ocean-3:#22b3c1;

  --tile-correct:#31d07f;
  --tile-present:#ffc933;
  --tile-absent:#58707b;

  --glass:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.14);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  overflow:hidden;
  background:
  radial-gradient(circle at top,#27d0dc22,transparent 40%),
  linear-gradient(180deg,var(--ocean-3),var(--ocean-2),var(--ocean-1));
  color:white;
}

/* ========================================================= */
/* START SCREEN */
/* ========================================================= */

#startScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.bgLetters{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.bgLetter{
  position:absolute;
  color:rgba(255,255,255,.08);
  font-weight:900;
  animation:rise linear infinite;
  user-select:none;
}

@keyframes rise{
  from{
    transform:translateY(120vh) rotate(0deg);
    opacity:0;
  }
  10%{opacity:.4;}
  90%{opacity:.15;}
  to{
    transform:translateY(-140vh) rotate(360deg);
    opacity:0;
  }
}

.startContent{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:20px;
}

.badge{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(10px);
  font-size:12px;
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:24px;
  animation:fadeUp .7s ease both;
}


.logo{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:3px;
}

.logo span{
  font-size:clamp(58px,12vw,140px);
  font-weight:900;
  line-height:1;
  display:inline-block;
  text-shadow:0 15px 30px rgba(0,0,0,.35);
  will-change:transform;
}

.logo span:nth-child(odd){
  color:white;
}

.logo span:nth-child(even){
  color:#7ff0fb;
}

.subtitle{
  margin-top:30px;
  max-width:650px;
  line-height:1.7;
  font-size:18px;
  color:rgba(255,255,255,.88);
  animation:fadeUp .8s ease .4s both;
}

.playBtn{
  margin-top:42px;
  border:none;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  padding:22px 55px;
  border-radius:999px;
  background:white;
  color:#0d5c63;
  font-size:22px;
  font-weight:800;
  transition:.3s;
  box-shadow:0 25px 60px rgba(0,0,0,.35);
  animation:fadeUp .8s ease .7s both;
}

.playBtn:hover{
  transform:translateY(-4px) scale(1.03);
}

.playBtn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.7),
    transparent
  );
  transform:translateX(-100%);
  transition:1s;
}

.playBtn:hover::before{
  transform:translateX(100%);
}

.tips{
  margin-top:50px;
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  justify-content:center;
}

.tip{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.tipBox{
  width:52px;
  height:52px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
}

.fade{
  animation:fadeUp .8s ease both;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

/* ========================================================= */
/* GAME */
/* ========================================================= */

#gameScreen{
  display:none;
  min-height:100vh;
  padding:24px;
}

.gameWrap{
  max-width:1000px;
  margin:auto;
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:30px;
}

.glassCard{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(14px);
  border-radius:24px;
  padding:14px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:700;
}

.backBtn{
  cursor:pointer;
  transition:.25s;
}

.backBtn:hover{
  transform:translateX(-4px);
}

.hint{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:28px;
  border-radius:28px;
  font-size:20px;
  line-height:1.7;
  backdrop-filter:blur(12px);
}

.grid{
  margin-top:28px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.tile{
  width:64px;
  height:64px;
  margin:3px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  text-transform:uppercase;

  background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.12);

  transition:
  transform .25s,
  background .25s,
  border-radius .25s,
  margin .25s,
  box-shadow .25s;
}

.tile.correct{
  background:var(--tile-correct);
  border-color:transparent;
  color:white;
  box-shadow:
  0 0 0 1px rgba(255,255,255,.15),
  0 10px 25px rgba(49,208,127,.45);
}

.tile.present{
  background:var(--tile-present);
  color:#2d2500;
  border-color:transparent;
}

.tile.absent{
  background:var(--tile-absent);
  opacity:.7;
  border-color:transparent;
}

.tile.pop{
  animation:pop .28s ease;
}

@keyframes pop{
  0%{transform:scale(.7);}
  70%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

.inputWrap{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

input{
  width:min(92%,450px);
  padding:18px;
  border:none;
  outline:none;
  border-radius:22px;
  text-align:center;
  font-size:22px;
  text-transform:uppercase;
  background:rgba(255,255,255,.92);
  color:#0d5c63;
  font-weight:700;
}

.submitBtn{
  border:none;
  cursor:pointer;
  padding:16px 42px;
  border-radius:999px;
  background:white;
  color:#0d5c63;
  font-size:18px;
  font-weight:800;
  transition:.25s;
}

.submitBtn:hover{
  transform:translateY(-3px);
}

.keyboard{
  margin-top:32px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.key{
  width:48px;
  height:56px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.92);
  color:#0d5c63;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.key:hover{
  transform:translateY(-2px);
}

.key.large{
  width:82px;
}

.message{
  margin-top:10px;
  min-height:24px;
  font-weight:600;
}

@media(max-width:700px){

  .tile{
    width:48px;
    height:48px;
    font-size:22px;
  }

  .key{
    width:38px;
    height:48px;
  }

  .logo span{
    font-size:64px;
  }

}
@keyframes floatSoft1{
  0%{transform:translateY(0px) rotate(0deg);}
  25%{transform:translateY(-10px) rotate(1deg);}
  50%{transform:translateY(5px) rotate(-1deg);}
  75%{transform:translateY(-6px) rotate(.5deg);}
  100%{transform:translateY(0px) rotate(0deg);}
}

@keyframes floatSoft2{
  0%{transform:translateY(0px) rotate(0deg);}
  20%{transform:translateY(8px) rotate(-1deg);}
  50%{transform:translateY(-12px) rotate(1deg);}
  80%{transform:translateY(6px) rotate(-.5deg);}
  100%{transform:translateY(0px) rotate(0deg);}
}

@keyframes floatSoft3{
  0%{transform:translateY(0px);}
  30%{transform:translateY(-14px) rotate(1deg);}
  60%{transform:translateY(4px) rotate(-1deg);}
  100%{transform:translateY(0px);}
}

</style>
</head>
<body>


<!-- ====================================================== -->
<!-- START -->
<!-- ====================================================== -->

<section id="startScreen">

  <div class="bgLetters" id="bgLetters"></div>

  <div class="startContent">

    <div class="badge">
      JOGO DE PALAVRAS DO MAR
    </div>

    <div class="logo" id="logo"></div>

    <div class="subtitle">
      Descubra palavras escondidas nas profundezas do oceano.
      Use lógica, encontre sequências corretas e mergulhe na experiência do LetroMar.
    </div>

    <button class="playBtn" onclick="startGame()">
      Jogar →
    </button>

    <div class="tips">

      <div class="tip fade" style="animation-delay:.9s">
        <div class="tipBox" style="background:var(--tile-correct)"></div>
        <small>letra correta</small>
      </div>

      <div class="tip fade" style="animation-delay:1s">
        <div class="tipBox" style="background:var(--tile-present)"></div>
        <small>posição errada</small>
      </div>

      <div class="tip fade" style="animation-delay:1.1s">
        <div class="tipBox" style="background:var(--tile-absent)"></div>
        <small>não existe</small>
      </div>

    </div>

  </div>

</section>

<!-- ====================================================== -->
<!-- GAME -->
<!-- ====================================================== -->


<section id="gameScreen">

  <div class="gameWrap">

    <div class="topBar">

      <div class="glassCard backBtn" onclick="goHome()">
        ← Voltar
      </div>

      <div class="glassCard">
        Pontos:
        <span id="score">0</span>
      </div>

    </div>

    <div class="hint" id="hint"></div>

    <div class="grid" id="grid"></div>

    <div class="inputWrap">

      <input
        id="guessInput"
        maxlength="10"
        placeholder="Digite uma palavra"
      />

      <button class="submitBtn" onclick="submitGuess()">
        Enviar
      </button>

      <div class="message" id="message"></div>

    </div>

    <div class="keyboard" id="keyboard"></div>

  </div>

</section>

<script>
/* ========================================================= */
/* FLOATING TITLE */
/* ========================================================= */


const logo = document.getElementById("logo");
const word = "LETROMAR";


word.split("").forEach((l,i)=>{

  const span = document.createElement("span");

  span.innerText = l;

  const animations = [
    "floatSoft1",
    "floatSoft2",
    "floatSoft3"
  ];

  const anim =
  animations[
    Math.floor(Math.random()*animations.length)
  ];

  const duration =
  3 + Math.random()*3;

  const delay =
  Math.random()*2;

  span.style.animation = `
  ${anim}
  ${duration}s
  ease-in-out
  ${delay}s
  infinite
  `;

  logo.appendChild(span);

});

/* ========================================================= */
/* BACKGROUND LETTERS */
/* ========================================================= */

const bg = document.getElementById("bgLetters");
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

for(let i=0;i<45;i++){

  const div = document.createElement("div");

  div.className = "bgLetter";
  div.innerText = letters[Math.floor(Math.random()*letters.length)];

  div.style.left = Math.random()*100+"vw";
  div.style.fontSize = 20 + Math.random()*90+"px";

  div.style.animationDuration = 10 + Math.random()*20+"s";
  div.style.animationDelay = Math.random()*8+"s";

  bg.appendChild(div);

}

/* ========================================================= */
/* DATA */
/* ========================================================= */
const phases = [
{
hint:"Mamífero gigante dos oceanos",
answer:"BALEIA"
},
{
hint:"Predador marinho cartilaginoso",
answer:"TUBARAO"
},
{
hint:"Molusco inteligente com tentáculos",
answer:"POLVO"
},
{
hint:"Estrutura colorida dos recifes",
answer:"CORAL"
},
{
hint:"Peixe famoso por viver entre anêmonas",
answer:"PALHACO"
},
{
hint:"Mamífero marinho conhecido pela inteligência",
answer:"GOLFINHO"
},
{
hint:"Animal marinho protegido por casco",
answer:"TARTARUGA"
},
{
hint:"Grande ecossistema que cobre boa parte da Terra",
answer:"OCEANO"
},
{
hint:"Fenômeno causado pela movimentação da Lua",
answer:"MARE"
},
{
hint:"Vegetação aquática essencial para o oceano",
answer:"ALGAS"
},
{
hint:"Animal gelatinoso com tentáculos urticantes",
answer:"AGUAVIVA"
},
{
hint:"Ave marinha típica das regiões frias",
answer:"PINGUIM"
},
{
hint:"Mamífero marinho com grandes presas",
answer:"MORSA"
},
{
hint:"Local onde barcos e navios atracam",
answer:"PORTO"
},
{
hint:"Instrumento usado para navegação",
answer:"BUSSOLA"
},
{
hint:"Grande quantidade de sal presente na água do mar",
answer:"SALINIDADE"
},
{
hint:"Movimento contínuo das águas oceânicas",
answer:"CORRENTE"
},
{
hint:"Ilha cercada completamente por água",
answer:"ARQUIPELAGO"
},
{
hint:"Material descartado que polui praias e mares",
answer:"PLASTICO"
},
{
hint:"Processo de reaproveitamento de resíduos",
answer:"RECICLAGEM"
},
{
hint:"Desequilíbrio ambiental causado por contaminantes",
answer:"POLUICAO"
},
{
hint:"Substância derramada que causa danos ambientais no mar",
answer:"PETROLEO"
},
{
hint:"Ecossistema costeiro rico em biodiversidade",
answer:"MANGUE"
},
{
hint:"Energia produzida pelo movimento das marés",
answer:"MAREMOTRIZ"
},
{
hint:"Depósito de areia no fundo do mar ou rios",
answer:"SEDIMENTO"
},
{
hint:"Objeto muito encontrado como lixo em praias",
answer:"GARRAFA"
},
{
hint:"Conjunto de seres vivos marinhos microscópicos",
answer:"PLANCTON"
},
{
hint:"Pequeno crustáceo encontrado em águas salgadas",
answer:"CAMARAO"
},
{
hint:"Animal marinho com cinco braços",
answer:"ESTRELA"
},
{
hint:"Animal espinhoso encontrado em recifes",
answer:"OURICO"
},
{
hint:"Animal marinho capaz de produzir tinta",
answer:"LULA"
},
{
hint:"Barco pequeno usado para pesca",
answer:"CANOA"
},
{
hint:"Área de areia próxima ao mar",
answer:"PRAIA"
},
{
hint:"Camada azul que cobre a maior parte do planeta",
answer:"MAR"
},
{
hint:"Conjunto de ondas fortes no oceano",
answer:"RESSACA"
},
{
hint:"Grande onda causada por terremotos submarinos",
answer:"TSUNAMI"
},
{
hint:"Formação natural de gelo encontrada nos mares polares",
answer:"ICEBERG"
},
{
hint:"Animal marinho conhecido pelo canto",
answer:"BALEIA"
},
{
hint:"Fenômeno de aquecimento dos oceanos e do planeta",
answer:"CLIMA"
},
{
hint:"Pessoa que mergulha profissionalmente",
answer:"MERGULHADOR"
}
];
let current = 0;
let score = 0;

/* ========================================================= */
/* ELEMENTS */
/* ========================================================= */

const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");

const hintEl = document.getElementById("hint");
const gridEl = document.getElementById("grid");
const inputEl = document.getElementById("guessInput");
const keyboardEl = document.getElementById("keyboard");
const messageEl = document.getElementById("message");

/* ========================================================= */
/* FUNCTIONS */
/* ========================================================= */

function normalize(word){
  return word
  .toUpperCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"");
}

function startGame(){

  startScreen.style.display = "none";
  gameScreen.style.display = "block";

  createKeyboard();
  loadPhase();

}

function goHome(){

  gameScreen.style.display = "none";
  startScreen.style.display = "flex";

}

function loadPhase(){

  gridEl.innerHTML = "";

  const phase = phases[current];

  hintEl.innerHTML = `
   ${phase.hint}
  `;

  inputEl.value = "";
  messageEl.innerText = "";

}

function createKeyboard(){

  keyboardEl.innerHTML = "";

  const keys = "QWERTYUIOPASDFGHJKLZXCVBNM";

  keys.split("").forEach(letter=>{

    const btn = document.createElement("button");

    btn.className = "key";
    btn.innerText = letter;

    btn.onclick = ()=>{

      if(inputEl.value.length < 10){
        inputEl.value += letter;
      }

    };

    keyboardEl.appendChild(btn);

  });

  const del = document.createElement("button");

  del.className = "key large";
  del.innerText = "⌫";

  del.onclick = ()=>{
    inputEl.value = inputEl.value.slice(0,-1);
  };

  keyboardEl.appendChild(del);

}

/* ========================================================= */
/* LETROSO STRUCTURE */
/* ========================================================= */

function createRow(guess,answer){

  const row = document.createElement("div");
  row.className = "row";

  const result = Array(guess.length).fill("absent");

  const used = Array(answer.length).fill(false);

  /* ===================================== */
  /* GREEN */
  /* ===================================== */

  for(let i=0;i<guess.length;i++){

    if(i < answer.length && guess[i] === answer[i]){

      result[i] = "correct";
      used[i] = true;

    }

  }

  /* ===================================== */
  /* YELLOW */
  /* ===================================== */

  for(let i=0;i<guess.length;i++){

    if(result[i] !== "correct"){

      for(let j=0;j<answer.length;j++){

        if(!used[j] && guess[i] === answer[j]){

          result[i] = "present";
          used[j] = true;
          break;

        }

      }

    }

  }

  /* ===================================== */
  /* STRUCTURAL BLOCKS */
  /* ===================================== */

  const blockMap = Array(guess.length).fill(-1);

  let blockId = 0;

  for(let start=0;start<guess.length;start++){

    let best = 0;

    for(let len=guess.length-start;len>=2;len--){

      const segment = guess.slice(start,start+len);

      if(answer.includes(segment)){

        best = len;
        break;

      }

    }

    if(best >= 2){

      let can = true;

      for(let k=start;k<start+best;k++){

        if(blockMap[k] !== -1){
          can = false;
          break;
        }

      }

      if(can){

        for(let k=start;k<start+best;k++){

          blockMap[k] = blockId;

        }

        blockId++;

      }

    }

  }

  /* ===================================== */
  /* RENDER */
  /* ===================================== */

  for(let i=0;i<guess.length;i++){

    const tile = document.createElement("div");

    tile.className = `
    tile
    ${result[i]}
    pop
    `;

    tile.style.animationDelay = `${i*70}ms`;

    tile.innerText = guess[i];

    const block = blockMap[i];

    const left =
    i>0 &&
    blockMap[i-1] === block &&
    block !== -1;

    const right =
    i<guess.length-1 &&
    blockMap[i+1] === block &&
    block !== -1;

    /* CONNECT */

    if(block !== -1){

      if(left){

        tile.style.marginLeft = "-8px";
        tile.style.borderTopLeftRadius = "8px";
        tile.style.borderBottomLeftRadius = "8px";

      }

      if(right){

        tile.style.marginRight = "-8px";
        tile.style.borderTopRightRadius = "8px";
        tile.style.borderBottomRightRadius = "8px";

      }

      if(left && right){

        tile.style.borderRadius = "8px";

      }

    }

    /* CAPSULE START */

    if(
      i === 0 &&
      guess[i] === answer[0]
    ){

      tile.style.borderTopLeftRadius = "28px";
      tile.style.borderBottomLeftRadius = "28px";

    }

    /* CAPSULE END */

    if(
      i === guess.length-1 &&
      guess[i] === answer[answer.length-1]
    ){

      tile.style.borderTopRightRadius = "28px";
      tile.style.borderBottomRightRadius = "28px";

    }

    row.appendChild(tile);

  }

  gridEl.appendChild(row);

}

/* ========================================================= */
/* KEYBOARD FEEDBACK */
/* ========================================================= */

function updateKeyboard(guess,answer){

  document.querySelectorAll(".key").forEach(btn=>{

    const letter = btn.innerText;

    if(letter === "⌫") return;

    if(guess.includes(letter)){

      if(answer.includes(letter)){

        btn.style.background = "var(--tile-correct)";
        btn.style.color = "white";

      }else{

        btn.style.background = "var(--tile-absent)";
        btn.style.color = "white";

      }

    }

  });

}

/* ========================================================= */
/* SUBMIT */
/* ========================================================= */

function submitGuess(){

  const answer = phases[current].answer;

  const guess = normalize(inputEl.value);

  if(!guess){

    messageEl.innerText = "Digite uma palavra.";
    return;

  }

  createRow(guess,answer);

  updateKeyboard(guess,answer);

  if(guess === answer){

    score++;

    document.getElementById("score").innerText = score;

    messageEl.innerText = "Correto!";
    

    setTimeout(()=>{

      current++;

      if(current >= phases.length){

        hintEl.innerHTML = `
         Você concluiu o LetroMar!
        `;

        keyboardEl.style.display = "none";

      }else{

        loadPhase();

      }

    },1200);

  }else{

    messageEl.innerText = "Continue tentando.";

  }

  inputEl.value = "";

}

inputEl.addEventListener("keydown",(e)=>{

  if(e.key === "Enter"){
    submitGuess();
  }

});


</script>

</body>
</html>
